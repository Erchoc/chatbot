[package]
name = "chatbot"
version = "0.1.0-beta.3"
edition = "2021"
description = "跨平台语音助手 CLI"
license = "MIT"

[[bin]]
name = "cb"
path = "src/main.rs"

[dependencies]
# CLI
clap = { version = "4", features = ["derive"] }

# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Audio
cpal = "0.15"
rodio = "0.19"
hound = "3.5"

# HTTP / WebSocket
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
tokio-tungstenite = { version = "0.24", default-features = false, features = ["connect", "rustls-tls-webpki-roots"] }
futures-util = "0.3"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# Encoding / Compression
base64 = "0.22"
flate2 = "1"

# Utilities
anyhow = "1"
uuid = { version = "1", features = ["v4"] }
dirs = "6"
ctrlc = "3.4"
dotenvy = "0.15"
crossterm = "0.28"
pinyin = "0.10"
libc = "0.2"

[profile.release]
opt-level = "z"
lto = true
strip = true
codegen-units = 1
