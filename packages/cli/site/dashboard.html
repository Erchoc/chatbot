<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cb dashboard</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* ── Dark theme (default) ── */
[data-theme="dark"]{
  --bg-0:#08090a;--bg-1:#0f1011;--bg-2:#191a1b;--bg-3:#222326;
  --surface:rgba(255,255,255,0.02);--surface-hover:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.07);--border-hover:rgba(255,255,255,0.12);
  --text:#f7f8f8;--text-2:#d0d6e0;--text-3:#8a8f98;--text-4:#62666d;
  --brand:#5e6ad2;--brand-hover:#7170ff;--brand-bg:rgba(94,106,210,.1);
  --green:#3dd68c;--green-bg:rgba(61,214,140,.1);
  --yellow:#f0c000;--yellow-bg:rgba(240,192,0,.1);
  --red:#e5534b;--red-bg:rgba(229,83,75,.1);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.06);
  --reply-border:var(--bg-3);
  --scrollbar:var(--bg-3);
}

/* ── Light theme ── */
[data-theme="light"]{
  --bg-0:#ffffff;--bg-1:#fafafa;--bg-2:#f4f4f5;--bg-3:#e4e4e7;
  --surface:rgba(0,0,0,0.02);--surface-hover:rgba(0,0,0,0.04);
  --border:rgba(0,0,0,0.08);--border-hover:rgba(0,0,0,0.15);
  --text:#171717;--text-2:#404040;--text-3:#737373;--text-4:#a3a3a3;
  --brand:#5e6ad2;--brand-hover:#4f5bc0;--brand-bg:rgba(94,106,210,.08);
  --green:#16a34a;--green-bg:rgba(22,163,74,.08);
  --yellow:#ca8a04;--yellow-bg:rgba(202,138,4,.08);
  --red:#dc2626;--red-bg:rgba(220,38,38,.08);
  --purple:#7c3aed;--purple-bg:rgba(124,58,237,.06);
  --reply-border:var(--bg-3);
  --scrollbar:var(--bg-3);
}

:root{
  --radius:8px;--radius-sm:6px;--radius-pill:9999px;
  --font:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Code','Cascadia Code',monospace;
  --shadow-border:0 0 0 1px var(--border);
  --transition:150ms ease;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg-0);color:var(--text);font-size:13px;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;gap:14px;padding:0 20px;height:52px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg-1);transition:background .2s,border-color .2s}
.topbar-brand{display:flex;align-items:center;gap:8px}
.topbar-logo{width:22px;height:22px;border-radius:6px;background:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:10px;color:#fff;letter-spacing:-0.5px}
.topbar-title{font-weight:600;font-size:14px;letter-spacing:-0.3px;color:var(--text)}
.topbar-spacer{flex:1}
.topbar-actions{display:flex;align-items:center;gap:10px}

/* live pill */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:var(--radius-pill);font-size:11px;font-weight:500;transition:all .2s}
.pill-live{background:var(--green-bg);color:var(--green)}
.pill-idle{background:var(--surface);color:var(--text-3);box-shadow:var(--shadow-border)}
.pill .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:background .3s}

/* theme toggle */
.theme-btn{width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text-3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition);font-size:14px;line-height:1}
.theme-btn:hover{border-color:var(--border-hover);color:var(--text)}
.theme-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* ── Custom dropdown ── */
.dropdown{position:relative}
.dropdown-trigger{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;transition:all var(--transition);white-space:nowrap;user-select:none}
.dropdown-trigger:hover{border-color:var(--border-hover)}
.dropdown-trigger svg{width:10px;height:10px;stroke:var(--text-4);flex-shrink:0;transition:transform .15s}
.dropdown.open .dropdown-trigger svg{transform:rotate(180deg)}
.dropdown-trigger .cal-icon{width:12px;height:12px;stroke:var(--text-3)}
.dropdown-menu{position:absolute;right:0;top:calc(100% + 4px);min-width:160px;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:100;overflow:hidden;display:none;max-height:240px;overflow-y:auto}
.dropdown.open .dropdown-menu{display:block}
.dropdown-item{padding:8px 12px;font-size:12px;color:var(--text-2);cursor:pointer;transition:background var(--transition);display:flex;align-items:center;justify-content:space-between}
.dropdown-item:hover{background:var(--surface-hover)}
.dropdown-item.active{color:var(--brand)}
.dropdown-item.active::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--brand)}

/* ── Layout ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:240px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;background:var(--bg-1);overflow-y:auto;transition:background .2s,border-color .2s}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px}
.sidebar-header{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.sidebar-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.8px;color:var(--text-4)}
.sidebar-count{font-size:10px;color:var(--text-4);background:var(--surface);padding:1px 7px;border-radius:var(--radius-pill)}
.session-item{padding:10px 16px;cursor:pointer;border-left:2px solid transparent;transition:all var(--transition)}
.session-item:hover{background:var(--surface-hover)}
.session-item.active{border-left-color:var(--brand);background:var(--brand-bg)}
.session-time{font-size:12px;font-weight:500;color:var(--text-2);display:flex;align-items:center;gap:6px}
.session-time .live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.session-meta{font-size:11px;color:var(--text-4);margin-top:3px;display:flex;gap:8px}
.session-meta span{display:inline-flex;align-items:center;gap:3px}
.no-sessions{padding:32px 16px;color:var(--text-4);font-size:12px;text-align:center;line-height:1.7}
.no-sessions code{color:var(--brand);font-family:var(--mono)}

/* ── Main ── */
.main{flex:1;overflow-y:auto;padding:24px;background:var(--bg-0);transition:background .2s}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}

/* ── Stats grid ── */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--bg-1);box-shadow:var(--shadow-border);border-radius:var(--radius);padding:14px 16px;transition:all .2s}
.stat:hover{box-shadow:0 0 0 1px var(--border-hover)}
.stat-val{font-size:24px;font-weight:600;letter-spacing:-1px;color:var(--text)}
.stat-label{font-size:10px;font-weight:500;color:var(--text-4);margin-top:4px;text-transform:uppercase;letter-spacing:.6px}

/* ── Timeline ── */
.events{display:flex;flex-direction:column;gap:8px}
.event{box-shadow:var(--shadow-border);border-radius:var(--radius);padding:14px 16px;transition:all var(--transition);background:var(--bg-1)}
.event:hover{box-shadow:0 0 0 1px var(--border-hover)}

.event.turn{border-left:2px solid var(--brand)}
.turn-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.turn-time{font-size:10px;font-family:var(--mono);color:var(--text-4)}
.turn-badge{font-size:9px;font-weight:600;padding:1px 6px;border-radius:var(--radius-pill);background:var(--brand-bg);color:var(--brand-hover);text-transform:uppercase;letter-spacing:.5px}
.turn-asr{color:var(--text);font-size:13px;line-height:1.6;margin-bottom:4px}
.turn-reply{color:var(--text-2);font-size:13px;line-height:1.6;margin-bottom:10px;padding-left:12px;border-left:2px solid var(--reply-border)}
.turn-metrics{display:flex;gap:16px;flex-wrap:wrap}
.metric{font-size:11px;color:var(--text-4);font-family:var(--mono)}
.metric b{color:var(--text-2);font-weight:500}

.event.skip{border-left:2px solid var(--yellow);opacity:.75}
.skip-row{display:flex;align-items:center;gap:8px;font-size:12px}
.skip-badge{font-size:9px;font-weight:600;padding:1px 6px;border-radius:var(--radius-pill);background:var(--yellow-bg);color:var(--yellow)}
.skip-text{color:var(--text-3)}
.skip-asr{font-size:11px;color:var(--text-4);margin-top:4px}

.event.error{border-left:2px solid var(--red)}
.error-header{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:4px}
.error-badge{font-size:9px;font-weight:600;padding:1px 6px;border-radius:var(--radius-pill);background:var(--red-bg);color:var(--red);text-transform:uppercase}
.error-msg{font-size:12px;color:var(--text-3);line-height:1.5;font-family:var(--mono)}

.event.session-start{border-left:2px solid var(--purple);background:var(--purple-bg)}
.event.session-end{border-left:2px solid var(--text-4);opacity:.6}
.session-info{font-size:12px;color:var(--text-3);line-height:1.8}
.session-info strong{color:var(--text);font-weight:500}
.session-tag{display:inline-block;font-size:10px;padding:1px 7px;border-radius:var(--radius-pill);background:var(--surface);color:var(--text-3);margin-left:4px}

.empty{text-align:center;padding:80px 24px;color:var(--text-4)}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.4}
.empty-title{font-size:15px;font-weight:500;margin-bottom:6px;color:var(--text-3)}
.empty-sub{font-size:12px;line-height:1.7}
.empty-sub code{color:var(--brand);font-family:var(--mono)}

@media(max-width:768px){
  .sidebar{display:none}
  .main{padding:16px}
  .stats{grid-template-columns:repeat(3,1fr)}
  .topbar{padding:0 14px;height:46px}
}
@media(max-width:480px){
  .stats{grid-template-columns:repeat(2,1fr);gap:8px}
  .stat{padding:10px 12px}
  .stat-val{font-size:20px}
  .event{padding:10px 12px}
  .turn-metrics{gap:10px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">cb</div>
    <span class="topbar-title">Dashboard</span>
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-actions">
    <div class="pill pill-idle" id="live-pill">
      <span class="dot" id="dot"></span>
      <span id="live-label">idle</span>
    </div>
    <div class="dropdown" id="date-dropdown">
      <button class="dropdown-trigger" onclick="toggleDropdown()">
        <svg class="cal-icon" viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="11" rx="2"/><path d="M5 1v3M11 1v3M2 7h12"/></svg>
        <span id="date-label">Today</span>
        <svg viewBox="0 0 10 6"><path d="M1 1l4 4 4-4"/></svg>
      </button>
      <div class="dropdown-menu" id="date-menu"></div>
    </div>
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme" id="theme-btn">
      <svg id="icon-sun" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <svg id="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-label">Sessions</span>
      <span class="sidebar-count" id="session-count">0</span>
    </div>
    <div id="session-list"><div class="no-sessions">No sessions yet<br>Run <code>cb</code> to start</div></div>
  </div>
  <div class="main" id="main">
    <div class="empty">
      <div class="empty-icon">&#9676;</div>
      <div class="empty-title">No events</div>
      <div class="empty-sub">Run <code>cb</code> to start a voice chat<br>Events appear here in real-time</div>
    </div>
  </div>
</div>

<script>
let allEvents=[],sessions=[],activeSessionId=null,selectedDate='',pollTimer=null,availDates=[];

/* ── Theme ── */
function getTheme(){return localStorage.getItem('cb-theme')||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark')}
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('cb-theme',t);
  document.getElementById('icon-sun').style.display=t==='dark'?'none':'block';
  document.getElementById('icon-moon').style.display=t==='dark'?'block':'none';
}
function toggleTheme(){applyTheme(getTheme()==='dark'?'light':'dark')}
applyTheme(getTheme());

/* ── Custom dropdown ── */
function toggleDropdown(){document.getElementById('date-dropdown').classList.toggle('open')}
document.addEventListener('click',e=>{
  if(!e.target.closest('#date-dropdown'))document.getElementById('date-dropdown').classList.remove('open');
});
function selectDate(d,label){
  selectedDate=d;
  document.getElementById('date-label').textContent=label;
  document.getElementById('date-dropdown').classList.remove('open');
  activeSessionId=null;
  clearInterval(pollTimer);
  poll().then(schedulePoll);
  renderDateMenu();
}
function renderDateMenu(){
  const menu=document.getElementById('date-menu');
  let html=`<div class="dropdown-item${selectedDate===''?' active':''}" onclick="selectDate('','Today')">Today</div>`;
  availDates.forEach(d=>{
    html+=`<div class="dropdown-item${selectedDate===d?' active':''}" onclick="selectDate('${d}','${d}')">${d}</div>`;
  });
  menu.innerHTML=html;
}

/* ── Bootstrap ── */
async function init(){
  await loadDates();
  renderDateMenu();
  await poll();
  schedulePoll();
}

async function loadDates(){
  try{
    const dates=await fetch('/api/events/dates').then(r=>r.json());
    availDates=dates.filter(d=>d!==todayStr());
  }catch{}
}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function schedulePoll(){pollTimer=setInterval(poll,selectedDate?10000:2500)}

async function poll(){
  try{
    const url=selectedDate?`/api/events?date=${selectedDate}`:'/api/events';
    const events=await fetch(url).then(r=>r.json());
    allEvents=events;
    processSessions(events);
    renderSidebar();
    if(activeSessionId)renderMain(activeSessionId);
    else if(sessions.length){activeSessionId=sessions[sessions.length-1].id;renderMain(activeSessionId)}
    updateLive(events);
  }catch{document.getElementById('live-label').textContent='offline'}
}

function processSessions(events){
  const map=new Map();
  events.forEach(e=>{
    if(e.type==='session_start'){
      map.set(e.session_id,{id:e.session_id,startTs:e.ts,model:e.model,voice:e.voice,language:e.language,turns:0,errors:0,skips:0,lastTs:e.ts,ended:false});
    }else{
      const s=map.get(e.session_id);if(!s)return;
      if(e.type==='turn')s.turns++;if(e.type==='error')s.errors++;if(e.type==='skip')s.skips++;if(e.type==='session_end')s.ended=true;s.lastTs=e.ts;
    }
  });
  sessions=[...map.values()].sort((a,b)=>b.startTs-a.startTs);
}

function updateLive(events){
  const pill=document.getElementById('live-pill'),dot=document.getElementById('dot'),label=document.getElementById('live-label');
  const last=events[events.length-1],age=last?(Date.now()-last.ts):Infinity,live=!selectedDate&&age<30000;
  pill.className=live?'pill pill-live':'pill pill-idle';
  dot.style.background=live?'var(--green)':'var(--text-4)';
  label.textContent=live?'live':'idle';
}

function renderSidebar(){
  const list=document.getElementById('session-list');
  document.getElementById('session-count').textContent=sessions.length;
  if(!sessions.length){list.innerHTML='<div class="no-sessions">No sessions yet<br>Run <code>cb</code> to start</div>';return}
  list.innerHTML=sessions.map(s=>`
    <div class="session-item${s.id===activeSessionId?' active':''}" onclick="selectSession('${s.id}')">
      <div class="session-time">${fmtTime(s.startTs)}${s.ended?'':'<span class="live-dot"></span>'}</div>
      <div class="session-meta"><span>${s.model}</span><span>${s.turns} turns</span>${s.errors?`<span style="color:var(--red)">${s.errors} err</span>`:''}</div>
    </div>`).join('');
}

function selectSession(id){activeSessionId=id;renderSidebar();renderMain(id)}

function renderMain(sid){
  const evts=allEvents.filter(e=>e.session_id===sid),main=document.getElementById('main');
  if(!evts.length){main.innerHTML='<div class="empty"><div class="empty-title">No events</div></div>';return}
  const turns=evts.filter(e=>e.type==='turn'),errors=evts.filter(e=>e.type==='error'),skips=evts.filter(e=>e.type==='skip');
  const as=avg(turns.map(t=>t.stt_ms)),al=avg(turns.map(t=>t.llm_ms)),at=avg(turns.map(t=>t.tts_ms));
  let h=`<div class="stats">
    <div class="stat"><div class="stat-val">${turns.length}</div><div class="stat-label">Turns</div></div>
    <div class="stat"><div class="stat-val">${errors.length}</div><div class="stat-label">Errors</div></div>
    <div class="stat"><div class="stat-val">${skips.length}</div><div class="stat-label">Skipped</div></div>
    ${turns.length?`<div class="stat"><div class="stat-val">${(as/1000).toFixed(1)}s</div><div class="stat-label">Avg STT</div></div>`:''}
    ${turns.length?`<div class="stat"><div class="stat-val">${(al/1000).toFixed(1)}s</div><div class="stat-label">Avg LLM</div></div>`:''}
    ${turns.length?`<div class="stat"><div class="stat-val">${(at/1000).toFixed(1)}s</div><div class="stat-label">Avg TTS</div></div>`:''}
  </div><div class="events">${evts.map(renderEvent).join('')}</div>`;
  main.innerHTML=h;
}

function renderEvent(e){
  const t=fmtTime(e.ts);
  switch(e.type){
    case 'session_start':return `<div class="event session-start"><div class="session-info"><strong>Session started</strong> <span class="turn-time">${t}</span><br><span class="session-tag">${e.model}</span><span class="session-tag">${e.voice}</span><span class="session-tag">${e.language}</span></div></div>`;
    case 'session_end':return `<div class="event session-end"><div class="session-info" style="color:var(--text-4)">Session ended &middot; ${t} &middot; ${e.turn_count} turns</div></div>`;
    case 'turn':return `<div class="event turn"><div class="turn-header"><span class="turn-badge">turn</span><span class="turn-time">${t}</span></div><div class="turn-asr">${esc(e.asr)}</div><div class="turn-reply">${esc(e.reply)}</div><div class="turn-metrics"><div class="metric">STT <b>${(e.stt_ms/1000).toFixed(2)}s</b></div><div class="metric">TTFT <b>${(e.ttft_ms/1000).toFixed(2)}s</b></div><div class="metric">LLM <b>${(e.llm_ms/1000).toFixed(2)}s</b></div><div class="metric">TTS <b>${(e.tts_ms/1000).toFixed(2)}s</b></div></div></div>`;
    case 'skip':return `<div class="event skip"><div class="skip-row"><span class="skip-badge">skip</span><span class="skip-text">${skipLabel(e.reason)}</span><span class="turn-time">${t}</span></div>${e.asr?`<div class="skip-asr">${esc(e.asr)}</div>`:''}</div>`;
    case 'error':return `<div class="event error"><div class="error-header"><span class="error-badge">${e.stage}</span><span class="turn-time">${t}</span></div><div class="error-msg">${esc(e.msg)}</div></div>`;
    default:return '';
  }
}

function fmtTime(ms){const d=new Date(ms);return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`}
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function skipLabel(r){const m={too_short:'Audio too short',empty_asr:'Empty ASR',wake_word:'Wake word missed',after_wake_word:'No content after wake word',user_deactivated:'User deactivated'};return m[r]||r}

init();
</script>
</body>
</html>
