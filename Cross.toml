# cross-rs configuration for Linux aarch64 ALSA cross-compilation
[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update -qq",
    "apt-get install -y --no-install-recommends pkg-config libasound2-dev:$CROSS_DEB_ARCH",
    "test -f /usr/lib/aarch64-linux-gnu/pkgconfig/alsa.pc || (echo 'alsa.pc missing; found:' && find /usr -name alsa.pc -print && exit 1)",
]
