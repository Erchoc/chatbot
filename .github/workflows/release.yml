name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build and validate artifacts only (skip GitHub Release publish)'
        required: true
        type: boolean
        default: true
      tag_name:
        description: 'Tag name to use when publishing from manual trigger (optional)'
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── macOS Universal Binary (arm64 + x86_64 → single fat binary) ───────────
  build-macos:
    name: Build macOS Universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/cli/target
          key: macos-universal-cargo-${{ hashFiles('packages/cli/Cargo.lock') }}
          restore-keys: macos-universal-cargo-

      - name: Build arm64
        run: cargo build --release --manifest-path packages/cli/Cargo.toml --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --manifest-path packages/cli/Cargo.toml --target x86_64-apple-darwin

      - name: Create Universal Binary
        run: |
          lipo -create \
            packages/cli/target/aarch64-apple-darwin/release/cb \
            packages/cli/target/x86_64-apple-darwin/release/cb \
            -output cb-macos-universal
          strip cb-macos-universal
          file cb-macos-universal

      - name: Codesign & Notarize
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        run: |
          # ── Import certificate into temporary keychain ──
          KEYCHAIN="build.keychain"
          KEYCHAIN_PW="actions"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          rm cert.p12

          # ── Sign with entitlements ──
          codesign --force --options runtime \
            --entitlements packages/cli/entitlements.plist \
            --sign "Developer ID Application: ${APPLE_TEAM_ID}" \
            --timestamp \
            cb-macos-universal

          codesign --verify --verbose cb-macos-universal

          # ── Notarize ──
          zip cb-notarize.zip cb-macos-universal
          xcrun notarytool submit cb-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 600
          rm cb-notarize.zip

          echo "✓ Signed and notarized"

      - name: Ad-hoc sign (no Apple credentials)
        if: ${{ env.APPLE_CERTIFICATE == '' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          codesign --force \
            --entitlements packages/cli/entitlements.plist \
            --sign - \
            cb-macos-universal
          echo "⚠ Ad-hoc signed only (no Apple Developer credentials configured)"

      - uses: actions/upload-artifact@v6
        with:
          name: cb-macos-universal
          path: cb-macos-universal

  # ── Linux x86_64 ──────────────────────────────────────────────────────────
  build-linux-x86:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/cli/target
          key: linux-x86-cargo-${{ hashFiles('packages/cli/Cargo.lock') }}
          restore-keys: linux-x86-cargo-

      - name: Install ALSA dev
        run: sudo apt-get install -y libasound2-dev

      - name: Build
        run: cargo build --release --manifest-path packages/cli/Cargo.toml --target x86_64-unknown-linux-gnu

      - name: Package
        run: |
          cp packages/cli/target/x86_64-unknown-linux-gnu/release/cb cb-linux-x86_64
          strip cb-linux-x86_64

      - uses: actions/upload-artifact@v6
        with:
          name: cb-linux-x86_64
          path: cb-linux-x86_64

  # ── Linux aarch64 (native ARM runner) ──────────────────────────────────────
  build-linux-arm:
    name: Build Linux aarch64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/cli/target
          key: linux-arm-native-cargo-${{ hashFiles('packages/cli/Cargo.lock') }}
          restore-keys: linux-arm-native-cargo-

      - name: Install ALSA dev
        run: sudo apt-get install -y libasound2-dev

      - name: Build
        run: cargo build --release --manifest-path packages/cli/Cargo.toml

      - name: Package
        run: |
          cp packages/cli/target/release/cb cb-linux-arm64
          strip cb-linux-arm64

      - uses: actions/upload-artifact@v6
        with:
          name: cb-linux-arm64
          path: cb-linux-arm64

  # ── Package + (optionally) Create GitHub Release ──────────────────────────
  release:
    name: Package / Release
    needs: [build-macos, build-linux-x86, build-linux-arm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Compute checksums
        run: |
          cd artifacts
          for dir in */; do
            file="${dir%/}"
            sha256sum "$file/$file" > "$file/$file.sha256"
          done

      - name: Resolve release tag
        id: meta
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.tag_name }}" ]]; then
            tag="${{ inputs.tag_name }}"
          else
            tag="manual-${GITHUB_RUN_NUMBER}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "resolved tag: ${tag}"

      - name: Dry-run summary
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          echo "Dry run complete. Built artifacts:"
          find artifacts -maxdepth 2 -type f -print | sort

      - name: Upload dry-run bundle
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        uses: actions/upload-artifact@v6
        with:
          name: release-dry-run-${{ steps.meta.outputs.tag }}
          path: artifacts

      - name: Create release
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/cb-macos-universal/cb-macos-universal
            artifacts/cb-macos-universal/cb-macos-universal.sha256
            artifacts/cb-linux-x86_64/cb-linux-x86_64
            artifacts/cb-linux-x86_64/cb-linux-x86_64.sha256
            artifacts/cb-linux-arm64/cb-linux-arm64
            artifacts/cb-linux-arm64/cb-linux-arm64.sha256
