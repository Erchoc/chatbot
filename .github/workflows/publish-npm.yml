name: publish npm (manual)

# The `on: release:` trigger was removed because releases created by
# release.yml using the default GITHUB_TOKEN do not fire downstream
# `release` events. npm publishing is now chained directly inside
# release.yml; this workflow remains as a manual fallback for
# re-publishing an existing release or recovering from a failed run.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Git tag of the release to publish from"
        required: true
        type: string
      dry_run:
        description: "If true, run npm publish --dry-run only"
        required: false
        type: boolean
        default: true

jobs:
  npm:
    uses: Erchoc/homebrew-tap/.github/workflows/publish-npm-reusable.yml@main
    with:
      tool:        cb
      release_tag: ${{ inputs.release_tag }}
      package_dir: packages/npm
      dry_run:     ${{ inputs.dry_run }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
